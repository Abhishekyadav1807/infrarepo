apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Abhishekyadav1807/infrarepo.git
    targetRevision: main
    path: k8s/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-task-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
