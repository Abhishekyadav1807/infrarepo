apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: yourdockerhub/ai-task-backend
    newTag: 45b0c75878be61dc8e9f08f14fe571a83f02fb1f
  - name: yourdockerhub/ai-task-frontend
    newTag: 45b0c75878be61dc8e9f08f14fe571a83f02fb1f
  - name: yourdockerhub/ai-task-worker
    newTag: 45b0c75878be61dc8e9f08f14fe571a83f02fb1f
patches:
  - target:
      kind: Deployment
      name: worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
