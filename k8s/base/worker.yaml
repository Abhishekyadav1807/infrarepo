apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: abhisheky1718/ai-task-worker:latest
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGO_URI
          livenessProbe:
            exec:
              command: ["python", "-c", "print('ok')"]
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "print('ready')"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"
