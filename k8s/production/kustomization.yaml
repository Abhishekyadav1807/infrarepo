apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: abhisheky1718/ai-task-backend
    newTag: prod
  - name: abhisheky1718/ai-task-frontend
    newTag: prod
  - name: abhisheky1718/ai-task-worker
    newTag: prod
patches:
  - target:
      kind: Deployment
      name: worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
